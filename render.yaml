services:
  - type: web
    name: gst-dashboard
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false  # Set this manually in the Render dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    plan: free
    healthCheckPath: /api/verify-pin
